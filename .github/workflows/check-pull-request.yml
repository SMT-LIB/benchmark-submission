name: Check Pull Request
on: [pull_request]
jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check if pull request removes benchmarks
        run: |
          if [[ $(git diff --diff-filter=D --name-only HEAD^1 HEAD) != "" ]] ; then
            echo "This pull requests removes benchmarks!" ; exit 1
          fi
      - name: Check if duplicated benchmarks are present
        run: |
          DUPES=`find . ! -empty -type f -name *smt2 -exec md5sum {} + | sort | uniq -w32 -d  | cut -d ' ' -f 3`
          if ! [[ "[$DUPES]" = "[]" ]]; then
            echo "Some benchmarks are duplicates of other benchmarks."
            echo $DUPES
            exit 1
          fi
      - name: Check if folder structure and filenames are correct
        run: |
          set +e
          valid_filenames="^(incremental|non-incremental)\/[A-Z_]+\/20[012][0-9][01][0-9][0123][0-9]-.+\/.+\.smt2$"
          status=0
          for added_file in `git diff --diff-filter=ACR --name-only HEAD^1 HEAD`; do
            if ! [[ ${added_file} =~ $valid_filenames ]] ;  then
              echo "The file ${added_file} has an inappropriate path!"
              status=1
            fi
            if ! ./quick-check.sh ${added_file} ; then
              status=1
            fi
          done
          exit $status
  check-with-dolmen:
    needs: basic-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Cache Dolmen
        id: dolmen-cache
        uses: actions/cache@v5
        with:
          key: dolmen-linux-amd64
          path: ./dolmen-linux-amd64
      - name: Install dolmen
        run: |
          if [ "[${{steps.dolmen-cache.outputs.cache-hit}}]" = "[]" ]; then
            wget https://github.com/Gbury/dolmen/releases/download/v0.10/dolmen-linux-amd64
          fi
          chmod +x ./dolmen-linux-amd64
      - name: Check files
        run: |
          set +e
          status=0
          for added_file in `git diff --diff-filter=ACRM --name-only HEAD^1 HEAD`; do
            VERSION=$(grep -oP "^\(set-info :smt-lib-version \K.*(?=\))" "${added_file}")
            ./dolmen-linux-amd64 --strict=false --check-headers=true --input=smt${VERSION} ${added_file}
            if [[ $? -ne 0 ]] ;  then
              echo "::error::Dolmen reported problems with ${added_file}."
              status=1
            fi
          done
          exit $status
  check-with-klhm:
    needs: basic-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Cache Klammerhammer
        id: klhm-cache
        uses: actions/cache@v5
        with:
          key: klhm
          path: ./SMT-LIB-db/klhm/zig-out/bin/klhm
      - name: Checkout Klammerhammer
        if: steps.klhm-cache.outputs.cache-hit != 'true'
        id: klhm-checkout
        uses: actions/checkout@v6
        with:
          repository: SMT-LIB/SMT-LIB-db
          path: SMT-LIB-db
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build Klammerhammer
        if: steps.klhm-cache.outputs.cache-hit != 'true'
        run: |
          cd SMT-LIB-db/klhm
          zig build -Doptimize=ReleaseFast -Dno-compression -Dbenchmark-commands
      - name: Check files
        run: |
          set +e
          status=0
          for added_file in `git diff --diff-filter=ACRM --name-only HEAD^1 HEAD`; do
            ./SMT-LIB-db/klhm/zig-out/bin/klhm ${added_file} > /dev/null
            if [[ $? -ne 0 ]] ;  then
              echo "::error::Klammerhammer reported problems with ${added_file}."
              status=1
            fi
          done
          exit $status

